dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.4
  envied_generator: ^1.1.1
  build_runner: ^2.4.15

flutter_native_splash:
  color: "#1D4ED8"
  image: assets\images\splash_logo.png
  android: true
  ios: true

  # محاذاة (اختياري)
  android_gravity: center
  ios_content_mode: center

  # أندرويد 12+
  android_12:
    color: "#1D4ED8"
    image: assets\images\splash_logo.png

  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/Logo-image.png" 

    


flutter:


  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/
    - assets/translations/
    - assets/icons/
    - assets/privacy/
    - assets/animations/


  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf

